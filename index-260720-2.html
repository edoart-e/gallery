<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>Edoart-e</title>
  <script src="script.js" defer></script>
</head>

<body class="container lg:text-xl lg:max-w-screen-lg lg:mx-auto">
  <header class="flex justify-between items-center md:w-full md:fixed md:h-16 lg:max-w-screen-lg">
    <!-- Mobile Nav Toggle -->
    <a href="#menu"
      id="home"
      class="inline-block md:hidden py-4 px-6 appearance-none focus:outline-none">
      <svg id="btn-hamburger" class="fill-current h-6 w-6" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <title>Menu</title>
        <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z" />
      </svg>
    </a>
    <!-- Title -->
    <a class="md:w-full py-4 px-6 md:py-0 text-3xl md:text-4xl" href="index.html"><span>Edoart-e</span></a>
    <!-- Navbar -->
    <nav id="menu" class="container p-4 md:py-2">
      <a href="#home"
        id="menu-close"
        class="absolute md:hidden top-0 right-0 p-6 z-20">
        <svg  id="btn-close" class="fill-current h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <time>Close</time>
          <path d="M23.954 21.03l-9.184-9.095 9.092-9.174-2.832-2.807-9.09 9.179-9.176-9.088-2.81 2.81 9.186 9.105-9.095 9.184 2.81 2.81 9.112-9.192 9.18 9.1z" />
        </svg>
      </a>
      <!-- Desktop Menu -->
        <ul class="min-h-full flex flex-col md:flex-row justify-around md:justify-end items-center relative z-10 py-12 md:py-0 text-3xl md:text-2xl">
          <li class="px-4 hover:text-blue-400"><a href="#works">Works</a></li>
          <li class="px-4 hover:text-blue-400"><a href="#profile">Profile</a></li>
          <li class="px-4 hover:text-blue-400"><a href="mailto:edoarte@proton.me" target="_blank">Contact</a></li>
          <li id="theme-toggle" class="px-4"><svg class="fill-current h-6 w-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2c5.514 0 10 4.486 10 10s-4.486 10-10 10v-20zm0-2c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12z" /></svg></li>
        </ul>
    </nav>
  </header>
  <!-- works -->
  <section id="works">
    <div id="works-container" class="container mx-auto px-4 py-8 md:pt-24 md:pb-12 flex flex-wrap justify-center items-center">
      <!-- Le card vengono generate automaticamente da script.js: modifica la lista "works" li' dentro -->
    </div>
  </section>
  <!-- Artist Profile -->
  <section id="profile">
    <div class="container mx-auto px-4 py-8 lg:pt-12 lg:pb-24 text-center">
      <img class="h-32 md:h-48 mx-auto mb-3 rounded-full flex justify-center items-center" src="assets/profile.jpg" alt="avatar" />
      <h2 class="text-4xl font-bold mb-2">Edoart-e</h2>
      <h3 class="text-xl mb-4">I am a young artist who loves drawing, and this is my first place on the web where I have collected my first creations. My dad is helping me with the IT infrastructure :)</h3>
      <!-- Socials -->
      <div class="flex flex-wrap justify-center pt-8 pb-4">
        <div class="w-16 h-16 flex justify-center items-center mx-4 border border-gray-400 rounded-full hover:border-blue-400 hover:text-blue-400">
          <a href="https://mastodon.uno/@Edoart_e" target="_blank" rel="me">
            <svg class="h-6 w-6 fill-current" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
              <path d="M433 179.11c0-97.2-63.71-125.7-63.71-125.7-62.52-28.7-228.56-28.4-290.48 0 0 0-63.72 28.5-63.72 125.7 0 115.7-6.6 259.4 105.63 289.1 40.51 10.7 75.32 13 103.33 11.4 50.81-2.8 79.32-18.1 79.32-18.1l-1.7-36.9s-36.31 11.4-77.12 10.1c-40.41-1.4-83-4.4-89.63-54a102.54 102.54 0 0 1-.9-13.9c85.63 20.9 158.65 9.1 178.75 6.7 56.12-6.7 105-41.3 111.23-72.9 9.8-49.8 9-121.5 9-121.5zm-75.12 125.2h-46.63v-114.2c0-24.1-10.1-36.3-30.3-36.3-22.31 0-33.51 14.4-33.51 42.9v62.2h-46.31v-62.2c0-28.5-11.2-42.9-33.51-42.9-20.2 0-30.3 12.2-30.3 36.3v114.2H90.51V186.6c0-24.1 6.2-43.2 18.4-57.5 12.6-14.3 29.1-21.6 49.61-21.6 23.7 0 41.6 9.1 53.51 27.3l11.5 19.3 11.5-19.3c11.91-18.2 29.81-27.3 53.51-27.3 20.5 0 37 7.3 49.61 21.6 12.2 14.3 18.4 33.4 18.4 57.5z"/>
            </svg>
          </a>
        </div>
        <div class="w-16 h-16 flex justify-center items-center mx-4 border border-gray-400 rounded-full hover:border-blue-400 hover:text-blue-400">
          <a href="mailto:edoarte@proton.me" target="_blank">
            <svg class="h-6 w-6 fill-current" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
              <path d="M64 112c-8.8 0-16 7.2-16 16v22.1L226.5 300.2c17.4 13 41.6 13 59.1 0L464 150.1V128c0-8.8-7.2-16-16-16H64zM48 212.2V384c0 8.8 7.2 16 16 16H448c8.8 0 16-7.2 16-16V212.2L322 328.8c-38.4 28.8-91.7 28.8-130 0L48 212.2zM0 128C0 92.7 28.7 64 64 64H448c35.3 0 64 28.7 64 64V384c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V128z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </section>
  <!-- Footer -->
  <footer>
    <div class="container flex flex-col sm:flex-row sm:flex-wrap justify-between items-center mx-auto mb-6 px-4 text-sm">
      <p class="uppercase">©2026 Edoart-e</p>
      <p><a class="hover:text-blue-400" href="https://github.com/yougotwill/art-gallery" target="_blank">Design: Art Gallery by William Grant</a></p>
    </div>
  </footer>
</body>
</html>
